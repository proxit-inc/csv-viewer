name: CI — Rust

on:
  push:
    branches: [main]
    paths:
      - 'src-tauri/src/**'
      - 'src-tauri/Cargo.toml'
      - 'src-tauri/Cargo.lock'
      - '.github/workflows/ci-rust.yml'
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened]
    paths:
      - 'src-tauri/src/**'
      - 'src-tauri/Cargo.toml'
      - 'src-tauri/Cargo.lock'
      - '.github/workflows/ci-rust.yml'

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  rust:
    name: Format, Clippy, Test
    runs-on: ubuntu-24.04
    defaults:
      run:
        working-directory: src-tauri
    env:
      # sccache caches compiled objects by source+flags hash, independent of
      # Cargo.lock. The dominant cost here is the bundled DuckDB C++ sources
      # (~9 min), which rust-cache can only reuse on an exact Cargo.lock match;
      # sccache reuses them even when a dependency bump invalidates that cache.
      SCCACHE_GHA_ENABLED: "true"
      RUSTC_WRAPPER: "sccache"
      # The cc crate recognizes `sccache` as a compiler wrapper, so the DuckDB
      # C/C++ build-script compiles route through sccache too.
      CC: "sccache cc"
      CXX: "sccache c++"
      # sccache is incompatible with Cargo incremental compilation.
      CARGO_INCREMENTAL: "0"
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Free disk space
        run: |
          sudo rm -rf /usr/share/dotnet
          sudo rm -rf /usr/local/lib/android
          sudo rm -rf /opt/ghc
          sudo rm -rf /opt/hostedtoolcache/CodeQL

      # The runner image's baked-in apt index can reference package builds the
      # mirror has already rotated out, causing sporadic 404s on transitive
      # deps (e.g. libnghttp2-dev) during the cached install below.
      - name: Refresh apt package lists
        run: sudo apt-get update

      - name: Cache system dependencies
        uses: awalsh128/cache-apt-pkgs-action@553a35bb8ebd9fcabcb1c9451aa4c98e1b4ca8a9 # v1.6.3
        with:
          packages: libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf
          version: 1.0

      - name: Setup Rust (stable)
        uses: dtolnay/rust-toolchain@4cda84d5c5c54efe2404f9d843567869ab1699d4 # stable
        with:
          components: clippy, rustfmt

      - name: Setup sccache
        uses: mozilla-actions/sccache-action@9e7fa8a12102821edf02ca5dbea1acd0f89a2696 # v0.0.10

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@23869a5bd66c73db3c0ac40331f3206eb23791dc # v2.9.1
        with:
          workspaces: src-tauri -> target
          cache-on-failure: true

      - name: Format check (cargo fmt)
        run: cargo fmt --check

      - name: Lint (cargo clippy)
        run: cargo clippy -- -D warnings

      - name: Run tests (cargo test)
        run: cargo test

      # PoC visibility: confirm sccache is actually serving cache hits for the
      # DuckDB C/C++ compiles. Review "Cache hits" vs "Compile requests" here.
      - name: sccache stats
        if: always()
        run: sccache --show-stats
